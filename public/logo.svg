<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="opsGradient" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0072ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="geminiGradient" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0072ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b06ab3;stop-opacity:1" />
    </linearGradient>
    <filter id="opsGlow" height="200%" width="200%" x="-50%" y="-50%">
      <feGaussianBlur result="blur" stdDeviation="4" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <path d="M120 20 L206.6 70 L206.6 170 L120 220 L33.4 170 L33.4 70 Z" fill="none" opacity="0.15" stroke="url(#opsGradient)" stroke-dasharray="10 5" stroke-width="2" />
  <circle cx="120" cy="120" fill="none" opacity="0.08" r="95" stroke="url(#opsGradient)" stroke-width="1">
    <animateTransform attributeName="transform" dur="20s" from="0 120 120" repeatCount="indefinite" to="360 120 120" type="rotate" />
  </circle>
  <g filter="url(#opsGlow)" transform="translate(120, 120)">
    <g>
      <g opacity="0.7">
        <path d="M0 -40 A40 40 0 1 1 34.6 -20" fill="none" stroke="url(#opsGradient)" stroke-linecap="round" stroke-width="6">
          <animateTransform attributeName="transform" dur="10s" repeatCount="indefinite" type="rotate" values="0;360" />
        </path>
        <path d="M0 -40 A40 40 0 1 1 34.6 -20" fill="none" stroke="url(#opsGradient)" stroke-linecap="round" stroke-width="6" transform="rotate(60)">
          <animateTransform attributeName="transform" dur="10s" repeatCount="indefinite" type="rotate" values="60;420" />
        </path>
        <path d="M0 -40 A40 40 0 1 1 34.6 -20" fill="none" stroke="url(#opsGradient)" stroke-linecap="round" stroke-width="6" transform="rotate(120)">
          <animateTransform attributeName="transform" dur="10s" repeatCount="indefinite" type="rotate" values="120;480" />
        </path>
        <path d="M0 -40 A40 40 0 1 1 34.6 -20" fill="none" stroke="url(#opsGradient)" stroke-linecap="round" stroke-width="6" transform="rotate(180)">
          <animateTransform attributeName="transform" dur="10s" repeatCount="indefinite" type="rotate" values="180;540" />
        </path>
        <path d="M0 -40 A40 40 0 1 1 34.6 -20" fill="none" stroke="url(#opsGradient)" stroke-linecap="round" stroke-width="6" transform="rotate(240)">
          <animateTransform attributeName="transform" dur="10s" repeatCount="indefinite" type="rotate" values="240;600" />
        </path>
        <path d="M0 -40 A40 40 0 1 1 34.6 -20" fill="none" stroke="url(#opsGradient)" stroke-linecap="round" stroke-width="6" transform="rotate(300)">
          <animateTransform attributeName="transform" dur="10s" repeatCount="indefinite" type="rotate" values="300;660" />
        </path>
      </g>
      <animateTransform attributeName="transform" dur="30s" from="0 0 0" repeatCount="indefinite" to="-360 0 0" type="rotate" />
    </g>
    <path d="M 0 -24 L 12 0 L 0 24 L -12 0 Z" fill="url(#geminiGradient)">
      <animateTransform attributeName="transform" dur="2s" repeatCount="indefinite" type="scale" values="0.8;1.2;0.8" />
      <animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="0.8;1;0.8" />
    </path>
    <line opacity="0.5" stroke="white" stroke-width="1" x1="-30" x2="30" y1="0" y2="0">
      <animate attributeName="y1" dur="3s" repeatCount="indefinite" values="-15;15;-15" />
      <animate attributeName="y2" dur="3s" repeatCount="indefinite" values="-15;15;-15" />
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0;0.6;0" />
    </line>
  </g>
  <g fill="none" opacity="0.2" stroke="url(#opsGradient)" stroke-width="1.5">
    <path d="M120 40 A80 80 0 0 1 200 120" stroke-dasharray="4 4" />
    <path d="M120 200 A80 80 0 0 1 40 120" stroke-dasharray="4 4" />
    <animateTransform attributeName="transform" dur="12s" from="0 120 120" repeatCount="indefinite" to="360 120 120" type="rotate" />
  </g>
</svg>
